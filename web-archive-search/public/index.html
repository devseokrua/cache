<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronica — Web Archive Search</title>
  <meta name="description" content="Search any website's history across Wayback Machine, Archive.today, Library of Congress and other archives — all in one place.">

  <!-- Favicons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://webcache.ivatech.dev/">
  <meta property="og:title" content="Chronica — Web Archive Search">
  <meta property="og:description" content="Find how any website looked in the past. Wayback Machine, Archive.today and more — all in one search.">
  <meta property="og:image" content="https://webcache.ivatech.dev/og.webp">
  <meta property="og:image" content="https://webcache.ivatech.dev/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Chronica">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Chronica — Web Archive Search">
  <meta name="twitter:description" content="Find how any website looked in the past. Wayback Machine, Archive.today and more — all in one search.">
  <meta name="twitter:image" content="https://webcache.ivatech.dev/og.webp">

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-inner">
    <a class="topbar-brand" href="/">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Chronica
    </a>
    <div class="topbar-controls">
      <div class="lang-switcher" id="langSwitcher" style="display:none">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="uk">UK</button>
        <button class="lang-btn" data-lang="ru">RU</button>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="page">

  <!-- ── Hero / Search ───────────────────────────────────────────────────── -->
  <div class="hero" id="hero">
    <div class="hero-badge" data-i18n="badge"></div>
    <h1 data-i18n-html="title"></h1>
    <p data-i18n-html="subtitle"></p>

    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input"
        autocomplete="off" autocapitalize="none" spellcheck="false">
      <button class="search-btn" id="searchBtn">
        <span class="btn-text" data-i18n="searchBtn"></span>
        <span class="btn-spin"></span>
      </button>
    </div>

    <div class="turnstile-wrap">
      <div id="cfTurnstile"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="hero-examples">
      <span data-i18n="examplesLabel"></span>
      <button class="example-btn" data-url="bbc.co.uk">bbc.co.uk</button>
      <button class="example-btn" data-url="whitehouse.gov">whitehouse.gov</button>
      <button class="example-btn" data-url="publico.pt">publico.pt</button>
    </div>
  </div>

  <!-- ── Marketing (hidden after search) ────────────────────────────────── -->
  <div class="marketing" id="marketing">

    <div class="stats-row">
      <div class="stat">
        <span class="stat-num">800B+</span>
        <span class="stat-label" data-i18n="stat1"></span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">5</span>
        <span class="stat-label" data-i18n="stat2"></span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">1996</span>
        <span class="stat-label" data-i18n="stat3"></span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">0$</span>
        <span class="stat-label" data-i18n="stat4"></span>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label" data-i18n="howTitle"></div>
      <div class="how-steps">
        <div class="how-step">
          <div class="how-num">1</div>
          <div class="how-text">
            <strong data-i18n="how1title"></strong>
            <p data-i18n="how1text"></p>
          </div>
        </div>
        <div class="how-connector"></div>
        <div class="how-step">
          <div class="how-num">2</div>
          <div class="how-text">
            <strong data-i18n="how2title"></strong>
            <p data-i18n="how2text"></p>
          </div>
        </div>
        <div class="how-connector"></div>
        <div class="how-step">
          <div class="how-num">3</div>
          <div class="how-text">
            <strong data-i18n="how3title"></strong>
            <p data-i18n="how3text"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label" data-i18n="ucTitle"></div>
      <div class="usecases-grid">
        <div class="usecase-card">
          <div class="uc-icon">📰</div>
          <strong data-i18n="uc1title"></strong>
          <p data-i18n="uc1text"></p>
        </div>
        <div class="usecase-card">
          <div class="uc-icon">⚖️</div>
          <strong data-i18n="uc2title"></strong>
          <p data-i18n="uc2text"></p>
        </div>
        <div class="usecase-card">
          <div class="uc-icon">💻</div>
          <strong data-i18n="uc3title"></strong>
          <p data-i18n="uc3text"></p>
        </div>
        <div class="usecase-card">
          <div class="uc-icon">🔬</div>
          <strong data-i18n="uc4title"></strong>
          <p data-i18n="uc4text"></p>
        </div>
      </div>
    </div>

    <div class="section-block">
      <div class="section-label" data-i18n="archivesTitle"></div>
      <div class="archives-list">
        <a href="https://web.archive.org" target="_blank" rel="noopener" class="archive-pill" style="--c:#1a73e8">
          <span class="ap-dot"></span>Wayback Machine<span class="ap-sub">800B+ pages</span>
        </a>
        <a href="https://archive.ph" target="_blank" rel="noopener" class="archive-pill" style="--c:#c0392b">
          <span class="ap-dot"></span>Archive.today<span class="ap-sub" data-i18n="archiveSub2"></span>
        </a>
        <a href="https://webarchive.loc.gov" target="_blank" rel="noopener" class="archive-pill" style="--c:#8e44ad">
          <span class="ap-dot"></span>Library of Congress<span class="ap-sub" data-i18n="archiveSub3"></span>
        </a>
        <a href="https://webarchive.nationalarchives.gov.uk" target="_blank" rel="noopener" class="archive-pill" style="--c:#16a085">
          <span class="ap-dot"></span>UK National Archives<span class="ap-sub" data-i18n="archiveSub4"></span>
        </a>
        <a href="https://arquivo.pt" target="_blank" rel="noopener" class="archive-pill" style="--c:#e67e22">
          <span class="ap-dot"></span>Arquivo.pt<span class="ap-sub" data-i18n="archiveSub5"></span>
        </a>
      </div>
    </div>

  </div><!-- /marketing -->

  <!-- ── Loading ────────────────────────────────────────────────────────── -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span data-i18n="loading"></span>
  </div>

  <!-- ── Results ────────────────────────────────────────────────────────── -->
  <div class="results" id="results">
    <div class="results-header">
      <span class="results-url" id="resultsUrl"></span>
      <span class="results-sub" id="resultsSub"></span>
    </div>
    <div class="services-grid" id="servicesGrid"></div>
    <div class="timeline-section">
      <div class="section-title" data-i18n="timelineTitle"></div>
      <div class="timeline" id="timeline"></div>
    </div>
    <div class="snapshots-section">
      <div class="section-title" data-i18n="snapshotsTitle"></div>
      <div class="snapshots-filter" id="snapshotsFilter"></div>
      <div class="snapshots-list" id="snapshotsList"></div>
    </div>
  </div>

</div><!-- /page -->

<!-- ── Upwork CTA ────────────────────────────────────────────────────────── -->
<section class="cta-section">
  <div class="cta-inner">
    <div class="cta-icon">💼</div>
    <h2 data-i18n="ctaTitle"></h2>
    <p data-i18n="ctaText"></p>
    <a href="https://www.upwork.com/agencies/ivatech/" target="_blank" rel="noopener" class="cta-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.561 13.158c-1.102 0-2.135-.467-3.074-1.227l.228-1.076.008-.042c.207-1.143.849-3.06 2.839-3.06 1.492 0 2.703 1.212 2.703 2.703-.001 1.489-1.212 2.702-2.704 2.702zm0-8.14c-2.539 0-4.51 1.649-5.31 4.366-1.22-1.834-2.148-4.036-2.687-5.892H8.559v7.112c-.002 1.406-1.141 2.546-2.547 2.546-1.405 0-2.543-1.14-2.543-2.546V3.492H1.462v7.112c0 2.914 2.37 5.303 5.284 5.303 2.913 0 5.282-2.389 5.282-5.303v-1.19c.529 1.107 1.182 2.229 1.974 3.221l-1.673 7.873h2.212l1.212-5.705c1.039.736 2.241 1.148 3.508 1.148 3.271 0 5.933-2.662 5.933-5.933-.001-3.271-2.663-5.932-5.933-5.932z"/></svg>
      <span data-i18n="ctaBtn"></span>
    </a>
  </div>
</section>

<footer>
  <p>
    <span data-i18n="footerText"></span>
    <a href="https://web.archive.org" target="_blank" rel="noopener">Wayback Machine</a>,
    <a href="https://archive.ph" target="_blank" rel="noopener">Archive.today</a>,
    <a href="https://webarchive.loc.gov" target="_blank" rel="noopener">Library of Congress</a>,
    <a href="https://webarchive.nationalarchives.gov.uk" target="_blank" rel="noopener">UK National Archives</a>,
    <a href="https://arquivo.pt" target="_blank" rel="noopener">Arquivo.pt</a>
  </p>
</footer>

<script src="app.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad&render=explicit" async defer></script>
</body>
</html>
